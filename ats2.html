  <meta name="description" content="Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture.


ABOUT SUPERHUMAN

Grammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at superhuman.com http://superhuman.com/ and about our values here https://blog.superhuman.com/our-values/.


THE OPPORTUNITY

We&#39;re on a mission to transform how the world communicates—and we need a Staff Technical Program Manager to shape the future of Coda.

Last year, Superhuman acquired Coda, bringing together flexible docs, powerful building blocks, and advanced AI to create a platform designed for how work will happen next. You&#39;ll be at the heart of Coda’s evolution—helping define and deliver an AI-first, agentic future where intelligent capabilities assist, suggest, act, and learn inside the product, while keeping humans firmly in control.

Working across engineering and product teams, you&#39;ll orchestrate the delivery of breakthrough capabilities that transform Coda from a powerful doc into a living workspace where agents help users plan, reason, synthesize, and execute. You will also play a critical role in scaling Coda to meet the needs of the Grammarly funnel—10x’ing adoption, exposing millions of Grammarly users to Coda, and expanding monetization through new product offerings and growth initiatives.

You&#39;re joining a team that&#39;s redefining what AI-native productivity can be. This requires a TPM who can connect the dots across our entire engineering organization—aligning distributed teams, navigating complex dependencies, and driving toward a unified vision where AI doesn’t just assist, but meaningfully augments human productivity at scale.


KEY RESPONSIBILITIES

 - Drive end-to-end product delivery. Own the program management of complex, multi-quarter product initiatives from concept to launch. Coordinate across engineering, design, research, data science, and go-to-market teams to ship high-quality products on time. Maintain clear visibility into milestones, dependencies, and risks throughout the product lifecycle.

 - Translate product vision into executable plans. Partner with product leaders to break down ambitious product strategies into phased delivery plans with clear success metrics. Identify critical path items, resource needs, and technical dependencies. Ensure engineering teams have the context and clarity needed to make autonomous decisions.

 - Manage technical and product trade-offs. Work closely with engineering and product management to evaluate scope, timelines, and quality trade-offs. Help teams make informed decisions about technical debt, feature completeness, and launch readiness. Balance business urgency with sustainable engineering practices.

 - Instrument and analyze product success. Collaborate with data teams to establish measurement frameworks, tracking plans, and success metrics. Conduct post-launch reviews to evaluate impact, gather learnings, and inform future iterations. Turn data insights into actionable product improvements.


QUALIFICATIONS

 - 7+ years driving product initiatives in fast-scaling tech companies. You’ve owned or contributed to product strategy and roadmaps, and now operate as a TPM, Product Program Manager, or similar leader. Bonus points if you’ve previously worked as a Product Manager or Product Owner, or have experience delivering user-facing products.

 - A track record of designing systems that scale. You&#39;ve built frameworks, processes, or tools that made it easier to adopt and helped organizations move faster while staying protected.

 - The ability to speak multiple languages fluently: technical concepts, business priorities, regulatory requirements, and executive strategy. You translate between these worlds effortlessly, building bridges where others see barriers.

 - You&#39;re a self-starter who connects dots others miss. You don&#39;t wait for perfect instructions—you gather context, identify gaps, and chart the path forward. You juggle multiple high-stakes initiatives without dropping balls or losing sight of strategic goals.

 - Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.

 - You thrive in ambiguity and move with urgency. Shifting priorities don&#39;t rattle you—they energize you. You bias toward action while maintaining the strategic perspective to know when to slow down and get alignment.


COMPENSATION &amp; BENEFITS

Superhuman offers all team members competitive pay along with a benefits package encompassing the following and more:

 - Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)

 - Disability and life insurance options

 - 401(k) and RRSP matching

 - Paid parental leave

 - 20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time

 - Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)

 - Annual professional development budget and opportunities




Superhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.

 

Base pay may vary considerably depending on job-related knowledge, skills, and experience. The expected salary ranges for this position are outlined below by compensation zone and may be modified in the future.

 

United States:

Zone 1: $232,000 – $319,000/year (USD)

We encourage you to apply

At Superhuman, we value our differences, and we encourage all to apply—especially those whose identities are traditionally underrepresented in tech organizations. We do not discriminate on the basis of race, religion, color, gender expression or identity, sexual orientation, ancestry, national origin, citizenship, age, marital status, veteran status, disability status, political belief, or any other characteristic protected by law. Superhuman is an equal opportunity employer and a participant in the US federal E-Verify program (US). We also abide by the Employment Equity Act.

ub - San Francisco","isListed":true,"suppressDescriptionOpening":false,"suppressDescriptionClosing":false,"descriptionHtml":"<p style=\"min-height:1.5em\"><em>Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture.</em></p><p style=\"min-height:1.5em\"></p><h2>About Superhuman</h2><p style=\"min-height:1.5em\">Grammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://superhuman.com/\"> superhuman.com</a> and about our <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://blog.superhuman.com/our-values/\">values here</a>.</p><p style=\"min-height:1.5em\"></p><h2>The Opportunity</h2><p style=\"min-height:1.5em\">We're on a mission to transform how the world communicates—and we need a Staff Technical Program Manager to shape the future of Coda.</p><p style=\"min-height:1.5em\">Last year, Superhuman acquired Coda, bringing together flexible docs, powerful building blocks, and advanced AI to create a platform designed for how work will happen next. You'll be at the heart of Coda’s evolution—helping define and deliver an AI-first, agentic future where intelligent capabilities assist, suggest, act, and learn inside the product, while keeping humans firmly in control.</p><p style=\"min-height:1.5em\">Working across engineering and product teams, you'll orchestrate the delivery of breakthrough capabilities that transform Coda from a powerful doc into a living workspace where agents help users plan, reason, synthesize, and execute. You will also play a critical role in scaling Coda to meet the needs of the Grammarly funnel—10x’ing adoption, exposing millions of Grammarly users to Coda, and expanding monetization through new product offerings and growth initiatives.</p><p style=\"min-height:1.5em\">You're joining a team that's redefining what AI-native productivity can be. This requires a TPM who can connect the dots across our entire engineering organization—aligning distributed teams, navigating complex dependencies, and driving toward a unified vision where AI doesn’t just assist, but meaningfully augments human productivity at scale.</p><p style=\"min-height:1.5em\"></p><h2>Key Responsibilities</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Drive end-to-end product delivery. Own the program management of complex, multi-quarter product initiatives from concept to launch. Coordinate across engineering, design, research, data science, and go-to-market teams to ship high-quality products on time. Maintain clear visibility into milestones, dependencies, and risks throughout the product lifecycle.</p></li><li><p style=\"min-height:1.5em\">Translate product vision into executable plans. Partner with product leaders to break down ambitious product strategies into phased delivery plans with clear success metrics. Identify critical path items, resource needs, and technical dependencies. Ensure engineering teams have the context and clarity needed to make autonomous decisions.</p></li><li><p style=\"min-height:1.5em\">Manage technical and product trade-offs. Work closely with engineering and product management to evaluate scope, timelines, and quality trade-offs. Help teams make informed decisions about technical debt, feature completeness, and launch readiness. Balance business urgency with sustainable engineering practices.</p></li><li><p style=\"min-height:1.5em\">Instrument and analyze product success. Collaborate with data teams to establish measurement frameworks, tracking plans, and success metrics. Conduct post-launch reviews to evaluate impact, gather learnings, and inform future iterations. Turn data insights into actionable product improvements.</p></li></ul><p style=\"min-height:1.5em\"></p><h2>Qualifications</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">7+ years driving product initiatives in fast-scaling tech companies. You’ve owned or contributed to product strategy and roadmaps, and now operate as a TPM, Product Program Manager, or similar leader. Bonus points if you’ve previously worked as a Product Manager or Product Owner, or have experience delivering user-facing products.</p></li><li><p style=\"min-height:1.5em\">A track record of designing systems that scale. You've built frameworks, processes, or tools that made it easier to adopt and helped organizations move faster while staying protected.</p></li><li><p style=\"min-height:1.5em\">The ability to speak multiple languages fluently: technical concepts, business priorities, regulatory requirements, and executive strategy. You translate between these worlds effortlessly, building bridges where others see barriers.</p></li><li><p style=\"min-height:1.5em\">You're a self-starter who connects dots others miss. You don't wait for perfect instructions—you gather context, identify gaps, and chart the path forward. You juggle multiple high-stakes initiatives without dropping balls or losing sight of strategic goals.</p></li><li><p style=\"min-height:1.5em\">Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.</p></li><li><p style=\"min-height:1.5em\">You thrive in ambiguity and move with urgency. Shifting priorities don't rattle you—they energize you. You bias toward action while maintaining the strategic perspective to know when to slow down and get alignment.</p></li></ul><p style=\"min-height:1.5em\"></p><h2>Compensation &amp; Benefits</h2><p style=\"min-height:1.5em\">Superhuman offers all team members competitive pay along with a benefits package encompassing the following and more:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)</p></li><li><p style=\"min-height:1.5em\">Disability and life insurance options</p></li><li><p style=\"min-height:1.5em\">401(k) and RRSP matching</p></li><li><p style=\"min-height:1.5em\">Paid parental leave</p></li><li><p style=\"min-height:1.5em\">20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time</p></li><li><p style=\"min-height:1.5em\">Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)</p></li><li><p style=\"min-height:1.5em\">Annual professional development budget and opportunities</p></li></ul><h2></h2><p style=\"min-height:1.5em\">Superhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-height:1.5em\">Base pay may vary considerably depending on job-related knowledge, skills, and experience. The expected salary ranges for this position are outlined below by compensation zone and may be modified in the future.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-height:1.5em\">United States:</p><p style=\"min-height:1.5em\">Zone 1: $232,000 – $319,000/year (USD)<br /><br /><strong>We encourage you to apply</strong></p><p style=\"min-height:1.5em\">At Superhuman, we value our differences, and we encourage all to apply—especially those whose identities are traditionally underrepresented in tech organizations. We do not discriminate on the basis of race, religion, color, gender expression or identity, sexual orientation, ancestry, national origin, citizenship, age, marital status, veteran status, disability status, political belief, or any other characteristic protected by law. Superhuman is an equal opportunity employer and a participant in the US federal E-Verify program (US). We also abide by the Employment Equity Act.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div>","descriptionPlainText":"Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture.\n\n\nABOUT SUPERHUMAN\n\nGrammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at superhuman.com http://superhuman.com/ and about our values here https://blog.superhuman.com/our-values/.\n\n\nTHE OPPORTUNITY\n\nWe're on a mission to transform how the world communicates—and we need a Staff Technical Program Manager to shape the future of Coda.\n\nLast year, Superhuman acquired Coda, bringing together flexible docs, powerful building blocks, and advanced AI to create a platform designed for how work will happen next. You'll be at the heart of Coda’s evolution—helping define and deliver an AI-first, agentic future where intelligent capabilities assist, suggest, act, and learn inside the product, while keeping humans firmly in control.\n\nWorking across engineering and product teams, you'll orchestrate the delivery of breakthrough capabilities that transform Coda from a powerful doc into a living workspace where agents help users plan, reason, synthesize, and execute. You will also play a critical role in scaling Coda to meet the needs of the Grammarly funnel—10x’ing adoption, exposing millions of Grammarly users to Coda, and expanding monetization through new product offerings and growth initiatives.\n\nYou're joining a team that's redefining what AI-native productivity can be. This requires a TPM who can connect the dots across our entire engineering organization—aligning distributed teams, navigating complex dependencies, and driving toward a unified vision where AI doesn’t just assist, but meaningfully augments human productivity at scale.\n\n\nKEY RESPONSIBILITIES\n\n - Drive end-to-end product delivery. Own the program management of complex, multi-quarter product initiatives from concept to launch. Coordinate across engineering, design, research, data science, and go-to-market teams to ship high-quality products on time. Maintain clear visibility into milestones, dependencies, and risks throughout the product lifecycle.\n\n - Translate product vision into executable plans. Partner with product leaders to break down ambitious product strategies into phased delivery plans with clear success metrics. Identify critical path items, resource needs, and technical dependencies. Ensure engineering teams have the context and clarity needed to make autonomous decisions.\n\n - Manage technical and product trade-offs. Work closely with engineering and product management to evaluate scope, timelines, and quality trade-offs. Help teams make informed decisions about technical debt, feature completeness, and launch readiness. Balance business urgency with sustainable engineering practices.\n\n - Instrument and analyze product success. Collaborate with data teams to establish measurement frameworks, tracking plans, and success metrics. Conduct post-launch reviews to evaluate impact, gather learnings, and inform future iterations. Turn data insights into actionable product improvements.\n\n\nQUALIFICATIONS\n\n - 7+ years driving product initiatives in fast-scaling tech companies. You’ve owned or contributed to product strategy and roadmaps, and now operate as a TPM, Product Program Manager, or similar leader. Bonus points if you’ve previously worked as a Product Manager or Product Owner, or have experience delivering user-facing products.\n\n - A track record of designing systems that scale. You've built frameworks, processes, or tools that made it easier to adopt and helped organizations move faster while staying protected.\n\n - The ability to speak multiple languages fluently: technical concepts, business priorities, regulatory requirements, and executive strategy. You translate between these worlds effortlessly, building bridges where others see barriers.\n\n - You're a self-starter who connects dots others miss. You don't wait for perfect instructions—you gather context, identify gaps, and chart the path forward. You juggle multiple high-stakes initiatives without dropping balls or losing sight of strategic goals.\n\n - Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.\n\n - You thrive in ambiguity and move with urgency. Shifting priorities don't rattle you—they energize you. You bias toward action while maintaining the strategic perspective to know when to slow down and get alignment.\n\n\nCOMPENSATION & BENEFITS\n\nSuperhuman offers all team members competitive pay along with a benefits package encompassing the following and more:\n\n - Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)\n\n - Disability and life insurance options\n\n - 401(k) and RRSP matching\n\n - Paid parental leave\n\n - 20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time\n\n - Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)\n\n - Annual professional development budget and opportunities\n\n\n\n\nSuperhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.\n\n \n\nBase pay may vary considerably depending on job-related knowledge, skills, and experience. The expected salary ranges for this position are outlined below by compensation zone and may be modified in the future.\n\n \n\nUnited States:\n\nZone 1: $232,000 – $319,000/year (USD)\n\nWe encourage you to apply\n\nAt Superhuman, we value our differences, and we encourage all to apply—especially those whose identities are traditionally underrepresented in tech organizations. We do not discriminate on the basis of race, religion, color, gender expression or identity, sexual orientation, ancestry, national origin, citizenship, age, marital status, veteran status, disability status, political belief, or any other characteristic protected by law. Superhuman is an equal opportunity employer and a participant in the US federal E-Verify program (US). We also abide by the Employment Equity Act.\n\n ","descriptionParts":{"descriptionOpening":null,"descriptionBody":{"html":"<p style=\"min-height:1.5em\"><em>Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture.</em></p><p style=\"min-height:1.5em\"></p><h2>About Superhuman</h2><p style=\"min-height:1.5em\">Grammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://superhuman.com/\"> superhuman.com</a> and about our <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://blog.superhuman.com/our-values/\">values here</a>.</p><p style=\"min-height:1.5em\"></p><h2>The Opportunity</h2><p style=\"min-height:1.5em\">We're on a mission to transform how the world communicates—and we need a Staff Technical Program Manager to shape the future of Coda.</p><p style=\"min-height:1.5em\">Last year, Superhuman acquired Coda, bringing together flexible docs, powerful building blocks, and advanced AI to create a platform designed for how work will happen next. You'll be at the heart of Coda’s evolution—helping define and deliver an AI-first, agentic future where intelligent capabilities assist, suggest, act, and learn inside the product, while keeping humans firmly in control.</p><p style=\"min-height:1.5em\">Working across engineering and product teams, you'll orchestrate the delivery of breakthrough capabilities that transform Coda from a powerful doc into a living workspace where agents help users plan, reason, synthesize, and execute. You will also play a critical role in scaling Coda to meet the needs of the Grammarly funnel—10x’ing adoption, exposing millions of Grammarly users to Coda, and expanding monetization through new product offerings and growth initiatives.</p><p style=\"min-height:1.5em\">You're joining a team that's redefining what AI-native productivity can be. This requires a TPM who can connect the dots across our entire engineering organization—aligning distributed teams, navigating complex dependencies, and driving toward a unified vision where AI doesn’t just assist, but meaningfully augments human productivity at scale.</p><p style=\"min-height:1.5em\"></p><h2>Key Responsibilities</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Drive end-to-end product delivery. Own the program management of complex, multi-quarter product initiatives from concept to launch. Coordinate across engineering, design, research, data science, and go-to-market teams to ship high-quality products on time. Maintain clear visibility into milestones, dependencies, and risks throughout the product lifecycle.</p></li><li><p style=\"min-height:1.5em\">Translate product vision into executable plans. Partner with product leaders to break down ambitious product strategies into phased delivery plans with clear success metrics. Identify critical path items, resource needs, and technical dependencies. Ensure engineering teams have the context and clarity needed to make autonomous decisions.</p></li><li><p style=\"min-height:1.5em\">Manage technical and product trade-offs. Work closely with engineering and product management to evaluate scope, timelines, and quality trade-offs. Help teams make informed decisions about technical debt, feature completeness, and launch readiness. Balance business urgency with sustainable engineering practices.</p></li><li><p style=\"min-height:1.5em\">Instrument and analyze product success. Collaborate with data teams to establish measurement frameworks, tracking plans, and success metrics. Conduct post-launch reviews to evaluate impact, gather learnings, and inform future iterations. Turn data insights into actionable product improvements.</p></li></ul><p style=\"min-height:1.5em\"></p><h2>Qualifications</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">7+ years driving product initiatives in fast-scaling tech companies. You’ve owned or contributed to product strategy and roadmaps, and now operate as a TPM, Product Program Manager, or similar leader. Bonus points if you’ve previously worked as a Product Manager or Product Owner, or have experience delivering user-facing products.</p></li><li><p style=\"min-height:1.5em\">A track record of designing systems that scale. You've built frameworks, processes, or tools that made it easier to adopt and helped organizations move faster while staying protected.</p></li><li><p style=\"min-height:1.5em\">The ability to speak multiple languages fluently: technical concepts, business priorities, regulatory requirements, and executive strategy. You translate between these worlds effortlessly, building bridges where others see barriers.</p></li><li><p style=\"min-height:1.5em\">You're a self-starter who connects dots others miss. You don't wait for perfect instructions—you gather context, identify gaps, and chart the path forward. You juggle multiple high-stakes initiatives without dropping balls or losing sight of strategic goals.</p></li><li><p style=\"min-height:1.5em\">Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.</p></li><li><p style=\"min-height:1.5em\">You thrive in ambiguity and move with urgency. Shifting priorities don't rattle you—they energize you. You bias toward action while maintaining the strategic perspective to know when to slow down and get alignment.</p></li></ul><p style=\"min-height:1.5em\"></p><h2>Compensation &amp; Benefits</h2><p style=\"min-height:1.5em\">Superhuman offers all team members competitive pay along with a benefits package encompassing the following and more:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)</p></li><li><p style=\"min-height:1.5em\">Disability and life insurance options</p></li><li><p style=\"min-height:1.5em\">401(k) and RRSP matching</p></li><li><p style=\"min-height:1.5em\">Paid parental leave</p></li><li><p style=\"min-height:1.5em\">20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time</p></li><li><p style=\"min-height:1.5em\">Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)</p></li><li><p style=\"min-height:1.5em\">Annual professional development budget and opportunities</p></li></ul><h2></h2><p style=\"min-height:1.5em\">Superhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-height:1.5em\">Base pay may vary considerably depending on job-related knowledge, skills, and experience. The expected salary ranges for this position are outlined below by compensation zone and may be modified in the future.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-height:1.5em\">United States:</p><p style=\"min-height:1.5em\">Zone 1: $232,000 – $319,000/year (USD)<br /><br /><strong>We encourage you to apply</strong></p><p style=\"min-height:1.5em\">At Superhuman, we value our differences, and we encourage all to apply—especially those whose identities are traditionally underrepresented in tech organizations. We do not discriminate on the basis of race, religion, color, gender expression or identity, sexual orientation, ancestry, national origin, citizenship, age, marital status, veteran status, disability status, political belief, or any other characteristic protected by law. Superhuman is an equal opportunity employer and a participant in the US federal E-Verify program (US). We also abide by the Employment Equity Act.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div>","plain":"Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture.\n\n\nABOUT SUPERHUMAN\n\nGrammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at superhuman.com http://superhuman.com/ and about our values here https://blog.superhuman.com/our-values/.\n\n\nTHE OPPORTUNITY\n\nWe're on a mission to transform how the world communicates—and we need a Staff Technical Program Manager to shape the future of Coda.\n\nLast year, Superhuman acquired Coda, bringing together flexible docs, powerful building blocks, and advanced AI to create a platform designed for how work will happen next. You'll be at the heart of Coda’s evolution—helping define and deliver an AI-first, agentic future where intelligent capabilities assist, suggest, act, and learn inside the product, while keeping humans firmly in control.\n\nWorking across engineering and product teams, you'll orchestrate the delivery of breakthrough capabilities that transform Coda from a powerful doc into a living workspace where agents help users plan, reason, synthesize, and execute. You will also play a critical role in scaling Coda to meet the needs of the Grammarly funnel—10x’ing adoption, exposing millions of Grammarly users to Coda, and expanding monetization through new product offerings and growth initiatives.\n\nYou're joining a team that's redefining what AI-native productivity can be. This requires a TPM who can connect the dots across our entire engineering organization—aligning distributed teams, navigating complex dependencies, and driving toward a unified vision where AI doesn’t just assist, but meaningfully augments human productivity at scale.\n\n\nKEY RESPONSIBILITIES\n\n - Drive end-to-end product delivery. Own the program management of complex, multi-quarter product initiatives from concept to launch. Coordinate across engineering, design, research, data science, and go-to-market teams to ship high-quality products on time. Maintain clear visibility into milestones, dependencies, and risks throughout the product lifecycle.\n\n - Translate product vision into executable plans. Partner with product leaders to break down ambitious product strategies into phased delivery plans with clear success metrics. Identify critical path items, resource needs, and technical dependencies. Ensure engineering teams have the context and clarity needed to make autonomous decisions.\n\n - Manage technical and product trade-offs. Work closely with engineering and product management to evaluate scope, timelines, and quality trade-offs. Help teams make informed decisions about technical debt, feature completeness, and launch readiness. Balance business urgency with sustainable engineering practices.\n\n - Instrument and analyze product success. Collaborate with data teams to establish measurement frameworks, tracking plans, and success metrics. Conduct post-launch reviews to evaluate impact, gather learnings, and inform future iterations. Turn data insights into actionable product improvements.\n\n\nQUALIFICATIONS\n\n - 7+ years driving product initiatives in fast-scaling tech companies. You’ve owned or contributed to product strategy and roadmaps, and now operate as a TPM, Product Program Manager, or similar leader. Bonus points if you’ve previously worked as a Product Manager or Product Owner, or have experience delivering user-facing products.\n\n - A track record of designing systems that scale. You've built frameworks, processes, or tools that made it easier to adopt and helped organizations move faster while staying protected.\n\n - The ability to speak multiple languages fluently: technical concepts, business priorities, regulatory requirements, and executive strategy. You translate between these worlds effortlessly, building bridges where others see barriers.\n\n - You're a self-starter who connects dots others miss. You don't wait for perfect instructions—you gather context, identify gaps, and chart the path forward. You juggle multiple high-stakes initiatives without dropping balls or losing sight of strategic goals.\n\n - Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.\n\n - You thrive in ambiguity and move with urgency. Shifting priorities don't rattle you—they energize you. You bias toward action while maintaining the strategic perspective to know when to slow down and get alignment.\n\n\nCOMPENSATION & BENEFITS\n\nSuperhuman offers all team members competitive pay along with a benefits package encompassing the following and more:\n\n - Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)\n\n - Disability and life insurance options\n\n - 401(k) and RRSP matching\n\n - Paid parental leave\n\n - 20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time\n\n - Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)\n\n - Annual professional development budget and opportunities\n\n\n\n\nSuperhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.\n\n \n\nBase pay may vary considerably depending on job-related knowledge, skills, and experience. The expected salary ranges for this position are outlined below by compensation zone and may be modified in the future.\n\n \n\nUnited States:\n\nZone 1: $232,000 – $319,000/year (USD)\n\nWe encourage you to apply\n\nAt Superhuman, we value our differences, and we encourage all to apply—especially those whose identities are traditionally underrepresented in tech organizations. We do not discriminate on the basis of race, religion, color, gender expression or identity, sexual orientation, ancestry, national origin, citizenship, age, marital status, veteran status, disability status, political belief, or any other characteristic protected by law. Superhuman is an equal opportunity employer and a participant in the US federal E-Verify program (US). We also abide by the Employment Equity Act.\n\n "},"descriptionClosing":null},"shortDescription":null,"applicationFormDefinitionId":"f0619e68-4b91-49d2-8463-12078b08ccc9","surveyFormDefinitionIds":["363bed25-c1f9-4bd3-a040-505710395fa6"],"linkedData":{"@context":"https://schema.org/","@type":"JobPosting","title":"Staff Technical Program Manager, Coda","description":"<p style=\"min-height:1.5em\"><em>Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture.</em></p><p style=\"min-height:1.5em\"></p><h2>About Superhuman</h2><p style=\"min-height:1.5em\">Grammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://superhuman.com/\"> superhuman.com</a> and about our <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://blog.superhuman.com/our-values/\">values here</a>.</p><p style=\"min-height:1.5em\"></p><h2>The Opportunity</h2><p style=\"min-height:1.5em\">We're on a mission to transform how the world communicates—and we need a Staff Technical Program Manager to shape the future of Coda.</p><p style=\"min-height:1.5em\">Last year, Superhuman acquired Coda, bringing together flexible docs, powe s or losing sight of strategic goals.</p></li><li><p style=\"min-height:1.5em\">Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.</p></li><li><p style=\"min-height:1.5em\">You thrive in ambiguity and move with urgency. Shifting priorities don't rattle you—they energize you. You bias toward action while maintaining the strategic perspective to know when to slow down and get alignment.</p></li></ul><p style=\"min-height:1.5em\"></p><h2>Compensation &amp; Benefits</h2><p style=\"min-height:1.5em\">Superhuman offers all team members competitive pay along with a benefits package encompassing the following and more:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)</p></li><li><p style=\"min-height:1.5em\">Disability and life insurance options</p></li><li><p style=\"min-height:1.5em\">401(k) and RRSP matching</p></li><li><p style=\"min-height:1.5em\">Paid parental leave</p></li><li><p style=\"min-height:1.5em\">20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time</p></li><li><p style=\"min-height:1.5em\">Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)</p></li><li><p style=\"min-height:1.5em\">Annual professional development budget and opportunities</p></li></ul><h2></h2><p style=\"min-height:1.5em\">Superhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-heig
