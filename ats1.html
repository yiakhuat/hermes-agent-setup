  <meta name="description" content="Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture. Learn more at superhuman.com http://superhuman.com/ and about our values here https://blog.superhuman.com/our-values/.


ABOUT SUPERHUMAN

Grammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at superhuman.com http://superhuman.com/.


THE OPPORTUNITY

We&#39;re on a mission to transform how the world communicates—and we need a Technical Program Manager who&#39;s ready to accelerate our growth at scale.

 

This isn&#39;t your typical TPM role. You&#39;ll be the strategic force that transforms our ambitious growth vision into measurable results. Working at the intersection of product, engineering, data, marketing, and go-to-market teams, you&#39;ll orchestrate the cross-functional initiatives that drive user acquisition, activation, engagement, and revenue. You&#39;ll ensure that growth isn&#39;t just a metric we chase—it&#39;s embedded into every product experience, experiment, and strategic decision we make.

 

In this pivotal role, you&#39;ll play a key part in enabling experimentation at scale, empowering teams to achieve outstanding results, and supporting Grammarly&#39;s mission to transform communication worldwide.


KEY RESPONSIBILITIES

 - Drive cross-functional growth initiatives from 0 to 1. Lead strategic programs that unlock new growth channels—whether launching referral programs, building viral loops, expanding into new markets, or developing freemium-to-paid conversion strategies. Navigate ambiguity, align diverse stakeholders, and deliver measurable impact on key growth metrics.

 - Scale successful growth tactics across the organization. When experiments win, drive rapid adoption across products, geographies, and user segments. Create playbooks that enable teams to replicate success. Build leverage by turning one-off wins into repeatable growth engines.

 - Be the strategic bridge between growth opportunities and execution velocity. Partner with senior leadership to translate market insights, user behavior data, and competitive dynamics into actionable growth programs that drive acquisition, retention, and monetization without compromising product quality.

 - Establish growth ops and tooling. Implement systems that reduce friction in the growth process—experiment management platforms, feature flagging infrastructure, audience segmentation tools, and analytics frameworks. Enable teams to move from idea to experiment to production in days, not weeks.

 - Champion PLG (Product-Led Growth) principles. Embed growth thinking into product development from the ground up. Ensure new features are designed with virality, retention, and monetization in mind. Transform product experiences into growth engines through thoughtful instrumentation and optimization.

 - Champion a growth-minded culture. Foster open dialogue about hypothesis testing, learning from failures, and sharing insights. Make growth expertise and data accessible across the organization. Celebrate teams who run rigorous experiments and implement winning learnings.


QUALIFICATIONS

 - 5+ years driving growth or product programs in fast-scaling tech companies.

 - A track record of designing systems that scale. You&#39;ve built frameworks, processes, or tools that made it easier to adopt and helped organizations move faster while staying protected.

 - The ability to speak multiple languages fluently: technical concepts, business priorities, regulatory requirements, and executive strategy. You translate between these worlds effortlessly, building bridges where others see barriers.

 - You&#39;re a self-starter who connects dots others miss. You don&#39;t wait for perfect instructions—you gather context, identify gaps, and chart the path forward. You juggle multiple high-stakes initiatives without dropping balls or losing sight of strategic goals.

 - Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.


COMPENSATION &amp; BENEFITS

Superhuman offers all team members competitive pay along with a benefits package encompassing the following and more:

 - Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)

 - Disability and life insurance options

 - 401(k) and RRSP matching

 - Paid parental leave

 - 20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time

 - Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)

 - Annual professional development budget and opportunities

Superhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.

Base pay may vary considerably depending on job-related knowledge, skills, and experience. The expected salary ranges for this position are outlined below by compensation zone and may be modified in the future.

 

United States:

Zone 1: $192,000 – $264,000/year (USD)

 


WE ENCOURAGE YOU TO APPLY

At Superhuman, we value our differences, and we encourage all to apply—especially those whose identities are traditionally underrepresented in tech organizations. We do not discriminate on the basis of race, religion, color, gender expression or identity, sexual orientation, ancestry, national origin, citizenship, age, marital status, veteran status, disability status, political belief, or any other characteristic protected by law. Superhuman is an equal opportunity employer and a participant in the US federal E-Verify program (US). We also abide by the Employment Equity Act.

:"Hub - San Francisco","isListed":true,"suppressDescriptionOpening":false,"suppressDescriptionClosing":false,"descriptionHtml":"<p style=\"min-height:1.5em\"><em>Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture. Learn more at</em><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://superhuman.com/\"><em> superhuman.com</em></a><em> and about our </em><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://blog.superhuman.com/our-values/\"><em>values here</em></a><em>.</em></p><p style=\"min-height:1.5em\"></p><h2>About Superhuman</h2><p style=\"min-height:1.5em\">Grammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://superhuman.com/\">superhuman.com</a>.</p><p style=\"min-height:1.5em\"></p><h2>The Opportunity</h2><p style=\"min-height:1.5em\">We're on a mission to transform how the world communicates—and we need a Technical Program Manager who's ready to accelerate our growth at scale.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-height:1.5em\">This isn't your typical TPM role. You'll be the strategic force that transforms our ambitious growth vision into measurable results. Working at the intersection of product, engineering, data, marketing, and go-to-market teams, you'll orchestrate the cross-functional initiatives that drive user acquisition, activation, engagement, and revenue. You'll ensure that growth isn't just a metric we chase—it's embedded into every product experience, experiment, and strategic decision we make.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-height:1.5em\">In this pivotal role, you'll play a key part in enabling experimentation at scale, empowering teams to achieve outstanding results, and supporting Grammarly's mission to transform communication worldwide.</p><p style=\"min-height:1.5em\"></p><h2>Key Responsibilities</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Drive cross-functional growth initiatives from 0 to 1. Lead strategic programs that unlock new growth channels—whether launching referral programs, building viral loops, expanding into new markets, or developing freemium-to-paid conversion strategies. Navigate ambiguity, align diverse stakeholders, and deliver measurable impact on key growth metrics.</p></li><li><p style=\"min-height:1.5em\">Scale successful growth tactics across the organization. When experiments win, drive rapid adoption across products, geographies, and user segments. Create playbooks that enable teams to replicate success. Build leverage by turning one-off wins into repeatable growth engines.</p></li><li><p style=\"min-height:1.5em\">Be the strategic bridge between growth opportunities and execution velocity. Partner with senior leadership to translate market insights, user behavior data, and competitive dynamics into actionable growth programs that drive acquisition, retention, and monetization without compromising product quality.</p></li><li><p style=\"min-height:1.5em\">Establish growth ops and tooling. Implement systems that reduce friction in the growth process—experiment management platforms, feature flagging infrastructure, audience segmentation tools, and analytics frameworks. Enable teams to move from idea to experiment to production in days, not weeks.</p></li><li><p style=\"min-height:1.5em\">Champion PLG (Product-Led Growth) principles. Embed growth thinking into product development from the ground up. Ensure new features are designed with virality, retention, and monetization in mind. Transform product experiences into growth engines through thoughtful instrumentation and optimization.</p></li><li><p style=\"min-height:1.5em\">Champion a growth-minded culture. Foster open dialogue about hypothesis testing, learning from failures, and sharing insights. Make growth expertise and data accessible across the organization. Celebrate teams who run rigorous experiments and implement winning learnings.</p></li></ul><p style=\"min-height:1.5em\"></p><h2>Qualifications</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">5+ years driving growth or product programs in fast-scaling tech companies.</p></li><li><p style=\"min-height:1.5em\">A track record of designing systems that scale. You've built frameworks, processes, or tools that made it easier to adopt and helped organizations move faster while staying protected.</p></li><li><p style=\"min-height:1.5em\">The ability to speak multiple languages fluently: technical concepts, business priorities, regulatory requirements, and executive strategy. You translate between these worlds effortlessly, building bridges where others see barriers.</p></li><li><p style=\"min-height:1.5em\">You're a self-starter who connects dots others miss. You don't wait for perfect instructions—you gather context, identify gaps, and chart the path forward. You juggle multiple high-stakes initiatives without dropping balls or losing sight of strategic goals.</p></li><li><p style=\"min-height:1.5em\">Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.</p></li></ul><p style=\"min-height:1.5em\"></p><h2>Compensation &amp; Benefits</h2><p style=\"min-height:1.5em\">Superhuman offers all team members competitive pay along with a benefits package encompassing the following and more:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)</p></li><li><p style=\"min-height:1.5em\">Disability and life insurance options</p></li><li><p style=\"min-height:1.5em\">401(k) and RRSP matching</p></li><li><p style=\"min-height:1.5em\">Paid parental leave</p></li><li><p style=\"min-height:1.5em\">20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time</p></li><li><p style=\"min-height:1.5em\">Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)</p></li><li><p style=\"min-height:1.5em\">Annual professional development budget and opportunities</p></li></ul><p style=\"min-height:1.5em\">Superhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.</p><p style=\"min-height:1.5em\">Base pay may vary considerably depending on job-related knowledge, skills, and experience. The expected salary ranges for this position are outlined below by compensation zone and may be modified in the future.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-height:1.5em\">United States:</p><p style=\"min-height:1.5em\">Zone 1: $192,000 – $264,000/year (USD)</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><h2><strong>We encourage you to apply</strong></h2><p style=\"min-height:1.5em\">At Superhuman, we value our differences, and we encourage all to apply—especially those whose identities are traditionally underrepresented in tech organizations. We do not discriminate on the basis of race, religion, color, gender expression or identity, sexual orientation, ancestry, national origin, citizenship, age, marital status, veteran status, disability status, political belief, or any other characteristic protected by law. Superhuman is an equal opportunity employer and a participant in the US federal E-Verify program (US). We also abide by the Employment Equity Act.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div>","descriptionPlainText":"Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture. Learn more at superhuman.com http://superhuman.com/ and about our values here https://blog.superhuman.com/our-values/.\n\n\nABOUT SUPERHUMAN\n\nGrammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at superhuman.com http://superhuman.com/.\n\n\nTHE OPPORTUNITY\n\nWe're on a mission to transform how the world communicates—and we need a Technical Program Manager who's ready to accelerate our growth at scale.\n\n \n\nThis isn't your typical TPM role. You'll be the strategic force that transforms our ambitious growth vision into measurable results. Working at the intersection of product, engineering, data, marketing, and go-to-market teams, you'll orchestrate the cross-functional initiatives that drive user acquisition, activation, engagement, and revenue. You'll ensure that growth isn't just a metric we chase—it's embedded into every product experience, experiment, and strategic decision we make.\n\n \n\nIn this pivotal role, you'll play a key part in enabling experimentation at scale, empowering teams to achieve outstanding results, and supporting Grammarly's mission to transform communication worldwide.\n\n\nKEY RESPONSIBILITIES\n\n - Drive cross-functional growth initiatives from 0 to 1. Lead strategic programs that unlock new growth channels—whether launching referral programs, building viral loops, expanding into new markets, or developing freemium-to-paid conversion strategies. Navigate ambiguity, align diverse stakeholders, and deliver measurable impact on key growth metrics.\n\n - Scale successful growth tactics across the organization. When experiments win, drive rapid adoption across products, geographies, and user segments. Create playbooks that enable teams to replicate success. Build leverage by turning one-off wins into repeatable growth engines.\n\n - Be the strategic bridge between growth opportunities and execution velocity. Partner with senior leadership to translate market insights, user behavior data, and competitive dynamics into actionable growth programs that drive acquisition, retention, and monetization without compromising product quality.\n\n - Establish growth ops and tooling. Implement systems that reduce friction in the growth process—experiment management platforms, feature flagging infrastructure, audience segmentation tools, and analytics frameworks. Enable teams to move from idea to experiment to production in days, not weeks.\n\n - Champion PLG (Product-Led Growth) principles. Embed growth thinking into product development from the ground up. Ensure new features are designed with virality, retention, and monetization in mind. Transform product experiences into growth engines through thoughtful instrumentation and optimization.\n\n - Champion a growth-minded culture. Foster open dialogue about hypothesis testing, learning from failures, and sharing insights. Make growth expertise and data accessible across the organization. Celebrate teams who run rigorous experiments and implement winning learnings.\n\n\nQUALIFICATIONS\n\n - 5+ years driving growth or product programs in fast-scaling tech companies.\n\n - A track record of designing systems that scale. You've built frameworks, processes, or tools that made it easier to adopt and helped organizations move faster while staying protected.\n\n - The ability to speak multiple languages fluently: technical concepts, business priorities, regulatory requirements, and executive strategy. You translate between these worlds effortlessly, building bridges where others see barriers.\n\n - You're a self-starter who connects dots others miss. You don't wait for perfect instructions—you gather context, identify gaps, and chart the path forward. You juggle multiple high-stakes initiatives without dropping balls or losing sight of strategic goals.\n\n - Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.\n\n\nCOMPENSATION & BENEFITS\n\nSuperhuman offers all team members competitive pay along with a benefits package encompassing the following and more:\n\n - Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)\n\n - Disability and life insurance options\n\n - 401(k) and RRSP matching\n\n - Paid parental leave\n\n - 20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time\n\n - Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)\n\n - Annual professional development budget and opportunities\n\nSuperhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.\n\nBase pay may vary considerably depending on job-related knowledge, skills, and experience. The expected salary ranges for this position are outlined below by compensation zone and may be modified in the future.\n\n \n\nUnited States:\n\nZone 1: $192,000 – $264,000/year (USD)\n\n \n\n\nWE ENCOURAGE YOU TO APPLY\n\nAt Superhuman, we value our differences, and we encourage all to apply—especially those whose identities are traditionally underrepresented in tech organizations. We do not discriminate on the basis of race, religion, color, gender expression or identity, sexual orientation, ancestry, national origin, citizenship, age, marital status, veteran status, disability status, political belief, or any other characteristic protected by law. Superhuman is an equal opportunity employer and a participant in the US federal E-Verify program (US). We also abide by the Employment Equity Act.\n\n ","descriptionParts":{"descriptionOpening":null,"descriptionBody":{"html":"<p style=\"min-height:1.5em\"><em>Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture. Learn more at</em><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://superhuman.com/\"><em> superhuman.com</em></a><em> and about our </em><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://blog.superhuman.com/our-values/\"><em>values here</em></a><em>.</em></p><p style=\"min-height:1.5em\"></p><h2>About Superhuman</h2><p style=\"min-height:1.5em\">Grammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://superhuman.com/\">superhuman.com</a>.</p><p style=\"min-height:1.5em\"></p><h2>The Opportunity</h2><p style=\"min-height:1.5em\">We're on a mission to transform how the world communicates—and we need a Technical Program Manager who's ready to accelerate our growth at scale.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-height:1.5em\">This isn't your typical TPM role. You'll be the strategic force that transforms our ambitious growth vision into measurable results. Working at the intersection of product, engineering, data, marketing, and go-to-market teams, you'll orchestrate the cross-functional initiatives that drive user acquisition, activation, engagement, and revenue. You'll ensure that growth isn't just a metric we chase—it's embedded into every product experience, experiment, and strategic decision we make.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-height:1.5em\">In this pivotal role, you'll play a key part in enabling experimentation at scale, empowering teams to achieve outstanding results, and supporting Grammarly's mission to transform communication worldwide.</p><p style=\"min-height:1.5em\"></p><h2>Key Responsibilities</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Drive cross-functional growth initiatives from 0 to 1. Lead strategic programs that unlock new growth channels—whether launching referral programs, building viral loops, expanding into new markets, or developing freemium-to-paid conversion strategies. Navigate ambiguity, align diverse stakeholders, and deliver measurable impact on key growth metrics.</p></li><li><p style=\"min-height:1.5em\">Scale successful growth tactics across the organization. When experiments win, drive rapid adoption across products, geographies, and user segments. Create playbooks that enable teams to replicate success. Build leverage by turning one-off wins into repeatable growth engines.</p></li><li><p style=\"min-height:1.5em\">Be the strategic bridge between growth opportunities and execution velocity. Partner with senior leadership to translate market insights, user behavior data, and competitive dynamics into actionable growth programs that drive acquisition, retention, and monetization without compromising product quality.</p></li><li><p style=\"min-height:1.5em\">Establish growth ops and tooling. Implement systems that reduce friction in the growth process—experiment management platforms, feature flagging infrastructure, audience segmentation tools, and analytics frameworks. Enable teams to move from idea to experiment to production in days, not weeks.</p></li><li><p style=\"min-height:1.5em\">Champion PLG (Product-Led Growth) principles. Embed growth thinking into product development from the ground up. Ensure new features are designed with virality, retention, and monetization in mind. Transform product experiences into growth engines through thoughtful instrumentation and optimization.</p></li><li><p style=\"min-height:1.5em\">Champion a growth-minded culture. Foster open dialogue about hypothesis testing, learning from failures, and sharing insights. Make growth expertise and data accessible across the organization. Celebrate teams who run rigorous experiments and implement winning learnings.</p></li></ul><p style=\"min-height:1.5em\"></p><h2>Qualifications</h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">5+ years driving growth or product programs in fast-scaling tech companies.</p></li><li><p style=\"min-height:1.5em\">A track record of designing systems that scale. You've built frameworks, processes, or tools that made it easier to adopt and helped organizations move faster while staying protected.</p></li><li><p style=\"min-height:1.5em\">The ability to speak multiple languages fluently: technical concepts, business priorities, regulatory requirements, and executive strategy. You translate between these worlds effortlessly, building bridges where others see barriers.</p></li><li><p style=\"min-height:1.5em\">You're a self-starter who connects dots others miss. You don't wait for perfect instructions—you gather context, identify gaps, and chart the path forward. You juggle multiple high-stakes initiatives without dropping balls or losing sight of strategic goals.</p></li><li><p style=\"min-height:1.5em\">Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.</p></li></ul><p style=\"min-height:1.5em\"></p><h2>Compensation &amp; Benefits</h2><p style=\"min-height:1.5em\">Superhuman offers all team members competitive pay along with a benefits package encompassing the following and more:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)</p></li><li><p style=\"min-height:1.5em\">Disability and life insurance options</p></li><li><p style=\"min-height:1.5em\">401(k) and RRSP matching</p></li><li><p style=\"min-height:1.5em\">Paid parental leave</p></li><li><p style=\"min-height:1.5em\">20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time</p></li><li><p style=\"min-height:1.5em\">Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)</p></li><li><p style=\"min-height:1.5em\">Annual professional development budget and opportunities</p></li></ul><p style=\"min-height:1.5em\">Superhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.</p><p style=\"min-height:1.5em\">Base pay may vary considerably depending on job-related knowledge, skills, and experience. The expected salary ranges for this position are outlined below by compensation zone and may be modified in the future.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><p style=\"min-height:1.5em\">United States:</p><p style=\"min-height:1.5em\">Zone 1: $192,000 – $264,000/year (USD)</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div><h2><strong>We encourage you to apply</strong></h2><p style=\"min-height:1.5em\">At Superhuman, we value our differences, and we encourage all to apply—especially those whose identities are traditionally underrepresented in tech organizations. We do not discriminate on the basis of race, religion, color, gender expression or identity, sexual orientation, ancestry, national origin, citizenship, age, marital status, veteran status, disability status, political belief, or any other characteristic protected by law. Superhuman is an equal opportunity employer and a participant in the US federal E-Verify program (US). We also abide by the Employment Equity Act.</p><div style=\"min-height:1.2em;margin-top:0;margin-bottom:0\"> </div>","plain":"Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture. Learn more at superhuman.com http://superhuman.com/ and about our values here https://blog.superhuman.com/our-values/.\n\n\nABOUT SUPERHUMAN\n\nGrammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps and agents brings AI wherever people work, integrating with over 1 million applications and websites. The company’s products include Grammarly’s writing assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant that understands context and delivers help automatically. Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions worldwide to eliminate busywork and focus on what matters. Learn more at superhuman.com http://superhuman.com/.\n\n\nTHE OPPORTUNITY\n\nWe're on a mission to transform how the world communicates—and we need a Technical Program Manager who's ready to accelerate our growth at scale.\n\n \n\nThis isn't your typical TPM role. You'll be the strategic force that transforms our ambitious growth vision into measurable results. Working at the intersection of product, engineering, data, marketing, and go-to-market teams, you'll orchestrate the cross-functional initiatives that drive user acquisition, activation, engagement, and revenue. You'll ensure that growth isn't just a metric we chase—it's embedded into every product experience, experiment, and strategic decision we make.\n\n \n\nIn this pivotal role, you'll play a key part in enabling experimentation at scale, empowering teams to achieve outstanding results, and supporting Grammarly's mission to transform communication worldwide.\n\n\nKEY RESPONSIBILITIES\n\n - Drive cross-functional growth initiatives from 0 to 1. Lead strategic programs that unlock new growth channels—whether launching referral programs, building viral loops, expanding into new markets, or developing freemium-to-paid conversion strategies. Navigate ambiguity, align diverse stakeholders, and deliver measurable impact on key growth metrics.\n\n - Scale successful growth tactics across the organization. When experiments win, drive rapid adoption across products, geographies, and user segments. Create playbooks that enable teams to replicate success. Build leverage by turning one-off wins into repeatable growth engines.\n\n - Be the strategic bridge between growth opportunities and execution velocity. Partner with senior leadership to translate market insights, user behavior data, and competitive dynamics into actionable growth programs that drive acquisition, retention, and monetization without compromising product quality.\n\n - Establish growth ops and tooling. Implement systems that reduce friction in the growth process—experiment management platforms, feature flagging infrastructure, audience segmentation tools, and analytics frameworks. Enable teams to move from idea to experiment to production in days, not weeks.\n\n - Champion PLG (Product-Led Growth) principles. Embed growth thinking into product development from the ground up. Ensure new features are designed with virality, retention, and monetization in mind. Transform product experiences into growth engines through thoughtful instrumentation and optimization.\n\n - Champion a growth-minded culture. Foster open dialogue about hypothesis testing, learning from failures, and sharing insights. Make growth expertise and data accessible across the organization. Celebrate teams who run rigorous experiments and implement winning learnings.\n\n\nQUALIFICATIONS\n\n - 5+ years driving growth or product programs in fast-scaling tech companies.\n\n - A track record of designing systems that scale. You've built frameworks, processes, or tools that made it easier to adopt and helped organizations move faster while staying protected.\n\n - The ability to speak multiple languages fluently: technical concepts, business priorities, regulatory requirements, and executive strategy. You translate between these worlds effortlessly, building bridges where others see barriers.\n\n - You're a self-starter who connects dots others miss. You don't wait for perfect instructions—you gather context, identify gaps, and chart the path forward. You juggle multiple high-stakes initiatives without dropping balls or losing sight of strategic goals.\n\n - Data informs your decisions, relationships drive your impact. You bring metrics and evidence to discussions, but you know that influencing change requires understanding what motivates different stakeholders. You adapt your approach based on what each audience needs to hear.\n\n\nCOMPENSATION & BENEFITS\n\nSuperhuman offers all team members competitive pay along with a benefits package encompassing the following and more:\n\n - Excellent health care (including a wide range of medical, dental, vision, mental health, and fertility benefits)\n\n - Disability and life insurance options\n\n - 401(k) and RRSP matching\n\n - Paid parental leave\n\n - 20 days of paid time off per year, 12 days of paid holidays per year, two floating holidays per year, and flexible sick time\n\n - Generous stipends (including those for caregiving, pet care, wellness, your home office, and more)\n\n - Annual professional development budget and opportunities\n\nSuperhuman takes a market-based approach to compensation, which means base pay may vary depending on your location. Our US locations are categorized into two compensation zones based on proximity to our hub locations.\n\nBase pay may vary considerably depending on job-related knowledge, skills, and experience. The expected salary ranges for this position are outlined below by compensation zone and may be modified in the future.\n\n \n\nUnited States:\n\nZone 1: $192,000 – $264,000/year (USD)\n\n \n\n\nWE ENCOURAGE YOU TO APPLY\n\nAt Superhuman, we value our differences, and we encourage all to apply—especially those whose identities are traditionally underrepresented in tech organizations. We do not discriminate on the basis of race, religion, color, gender expression or identity, sexual orientation, ancestry, national origin, citizenship, age, marital status, veteran status, disability status, political belief, or any other characteristic protected by law. Superhuman is an equal opportunity employer and a participant in the US federal E-Verify program (US). We also abide by the Employment Equity Act.\n\n "},"descriptionClosing":null},"shortDescription":null,"applicationFormDefinitionId":"e0e6d9e7-bf34-4e66-a373-ff49bb700fa3","surveyFormDefinitionIds":["363bed25-c1f9-4bd3-a040-505710395fa6"],"linkedData":{"@context":"https://schema.org/","@type":"JobPosting","title":"Senior Technical Program Manager, Growth","description":"<p style=\"min-height:1.5em\"><em>Superhuman offers a dynamic hybrid working model for this role. This flexible approach gives team members the best of both worlds: plenty of focus time along with in-person collaboration that helps foster trust, innovation, and a strong team culture. Learn more at</em><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://superhuman.com/\"><em> superhuman.com</em></a><em> and about our </em><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://blog.superhuman.com/our-values/\"><em>values here</em></a><em>.</em></p><p style=\"min-height:1.5em\"></p><h2>About Superhuman</h2><p style=\"min-height:1.5em\">Grammarly is now part of Superhuman, the AI productivity platform on a mission to unlock the superhuman potential in everyone. The Superhuman suite of apps a
