    <script type="application/ld+json">{"@context":"https://schema.org/","@type":"JobPosting","title":"Senior Technical Program Manager ","description":"<h2><strong>Company Overview</strong></h2><p style=\"min-height:1.5em\">EchoTwin AI is pioneering AI-driven infrastructure intelligence, redefining how cities are managed. Powered by a proprietary visual intelligence engine with full spatial reasoning, EchoTwin transforms municipal fleets into mobile urban sensors—creating living digital twins that provide real-time insights into infrastructure, compliance, and safety. By enabling municipalities to proactively monitor, predict, and resolve issues, EchoTwin helps build resilient, self-healing, and sustainable urban ecosystems. More than “smart cities,” EchoTwin is advancing the era of cognizant cities—urban environments with the awareness to see, think, and act on challenges in real time.</p><p style=\"min-height:1.5em\"></p><h2><strong>What The Job Involves</strong></h2><p style=\"min-height:1.5em\">EchoTwin AI is looking for a Senior Technical Program Manager to plan and execute complex end-to-end programs. You will work across engineering, product management, business, and operations to drive strategy into roadmaps and plans that deliver critical work on time and at high quality. In this role, you will lead a multi-disciplinary effort across hardware, device software, cloud, and perception through all product lifecycle stages. </p><h1></h1><h2><strong>Responsibilities</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Own the program’s success end-to-end</p></li><li><p style=\"min-height:1.5em\">Lead the team to deliver results for our customers and our business</p></li><li><p style=\"min-height:1.5em\">Create clear program plans from input across the company</p></li><li><p style=\"min-height:1.5em\">Prioritize and drive tasks to closure</p></li><li><p style=\"min-height:1.5em\">Provide insightful program updates to stakeholders and executive </p></li><li><p style=\"min-height:1.5em\">Anticipate and resolve program issues, productively escalate as needed</p></li><li><p style=\"min-height:1.5em\">Triage field issues and adapt programs to emerging needs</p></li><li><p style=\"min-height:1.5em\">Coordinate cross-functional dependencies across the company</p></li><li><p style=\"min-height:1.5em\">Identify opportunities to improve execution and initiate solutions</p><h1></h1></li></ul><h2><strong>Qualifications</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">7+ years experience in Technical Program Management or Engineering Program Management.</p></li><li><p style=\"min-height:1.5em\">Experience leading the development and launch of at least 3 new products into production. </p></li><li><p style=\"min-height:1.5em\">Strong technical background in hardware, device software, and cloud development, with a solid understanding of engineering principles, processes, and best practices.</p></li><li><p style=\"min-height:1.5em\">Experience working closely with multidisciplinary technical teams to drive fast-paced delivery of critical products and functionality.</p></li><li><p style=\"min-height:1.5em\">Deep knowledge of tools and techniques for managing complex product development through its entire lifecycle. </p></li><li><p style=\"min-height:1.5em\">Experience delivering innovative technologies to government agencies is a plus. </p></li><li><p style=\"min-height:1.5em\">B.S. in an engineering discipline.</p></li></ul><p style=\"min-height:1.5em\"></p><h2><strong>Benefits and Perks</strong></h2><p style=\"min-height:1.5em\">There are endless learning and development opportunities from a highly diverse and talented peer group, including experts in various fields, including Computer Vision, GenAI, Digital Twin, Government Contracting, Systems and Device Engineering, Operations, Communications, and more!</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Options for medical, dental, and vision coverage for employees and dependents (for US employees)</p></li><li><p style=\"min-height:1.5em\">Flexible Spending Account (FSA) and Dependent Care Flexible Spending Account (DCFSA)</p></li><li><p style=\"min-height:1.5em\">401(k) with 3% company matching</p></li><li><p style=\"min-height:1.5em\">Unlimited PTO</p></li><li><p style=\"min-height:1.5em\">Profit sharing </p></li></ul><p style=\"min-height:1.5em\">Please do not forward resumes to our jobs alias, EchoTwin AI employees, or any other company location. EchoTwin AI is not responsible for any fees related to unsolicited resumes.</p><p style=\"min-height:1.5em\"></p><h2><strong>Life at EchoTwin AI</strong></h2><p style=\"min-height:1.5em\">If you want to empower the world’s most important cities—and the institutions that run them—you belong here. At EchoTwin AI, we value excellence regardless of background and are committed to building a team that reflects the communities we serve.</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\">EchoTwin AI is an Equal Opportunity Employer. We consider all qualified applicants without regard to race, color, religion, sex (including pregnancy), sexual orientation, gender identity or expression, national origin, age, disability, veteran status, genetic information, or any other status protected by applicable law.</p>","directApply":true,"identifier":{"@type":"PropertyValue","name":"EchoTwin AI","value":"93888d8f-d32c-4213-8768-93b2bc63fc03"},"datePosted":"2025-09-06","hiringOrganization":{"@type":"Organization","name":"EchoTwin AI","sameAs":"www.echotwin.ai","logo":"https://app.ashbyhq.com/api/images/org-theme-logo/ceb634b1-bc02-47b8-b6a6-3bc5d38d698c/ac75acc8-3bcd-40c2-a720-223907f3e224/83b72463-d567-4216-95c9-144f321778c4.png"},"jobLocation":{"@type":"Place","address":{"@type":"PostalAddress","addressLocality":"San Francisco","addressRegion":"California","addressCountry":"United States"}},"employmentType":"FULL_TIME"}</script>

d in hardware, device software, and cloud development, with a solid understanding of engineering principles, processes, and best practices.</p></li><li><p style=\"min-height:1.5em\">Experience working closely with multidisciplinary technical teams to drive fast-paced delivery of critical products and functionality.</p></li><li><p style=\"min-height:1.5em\">Deep knowledge of tools and techniques for managing complex product development through its entire lifecycle. </p></li><li><p style=\"min-height:1.5em\">Experience delivering innovative technologies to government agencies is a plus. </p></li><li><p style=\"min-height:1.5em\">B.S. in an engineering discipline.</p></li></ul><p style=\"min-height:1.5em\"></p><h2><strong>Benefits and Perks</strong></h2><p style=\"min-height:1.5em\">There are endless learning and development opportunities from a highly diverse and talented peer group, including experts in various fields, including Computer Vision, GenAI, Digital Twin, Government Contracting, Systems and Device Engineering, Operations, Communications, and more!</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Options for medical, dental, and vision coverage for employees and dependents (for US employees)</p></li><li><p style=\"min-height:1.5em\">Flexible Spending Account (FSA) and Dependent Care Flexible Spending Account (DCFSA)</p></li><li><p style=\"min-height:1.5em\">401(k) with 3% company matching</p></li><li><p style=\"min-height:1.5em\">Unlimited PTO</p></li><li><p style=\"min-height:1.5em\">Profit sharing </p></li></ul><p style=\"min-height:1.5em\">Please do not forward resumes to our jobs alias, EchoTwin AI employees, or any other company location. EchoTwin AI is not responsible for any fees related to unsolicited resumes.</p><p style=\"min-height:1.5em\"></p><h2><strong>Life at EchoTwin AI</strong></h2><p style=\"min-height:1.5em\">If you want to empower the world’s most important cities—and the institutions that run them—you belong here. At
